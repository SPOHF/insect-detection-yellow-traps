services:
  postgres:
    image: postgres:16
    container_name: swd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: swd_monitoring
      POSTGRES_USER: swd_user
      POSTGRES_PASSWORD: swd_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.26
    container_name: swd_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/neo4j_password
    ports:
      - '7474:7474'
      - '7687:7687'
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  neo4j_data:
