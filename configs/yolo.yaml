project: insect_yellow

data:
  coco:
    train:
      images_dir: src/cvcore/data/SPoHF.v9i.coco/train
      annotations_path: src/cvcore/data/SPoHF.v9i.coco/train/_annotations.coco.json
    val:
      images_dir: src/cvcore/data/SPoHF.v9i.coco/valid
      annotations_path: src/cvcore/data/SPoHF.v9i.coco/valid/_annotations.coco.json
    test:
      images_dir: src/cvcore/data/SPoHF.v9i.coco/test
      annotations_path: src/cvcore/data/SPoHF.v9i.coco/test/_annotations.coco.json
  masking:
    enabled: true
    mode: mask
    hsv_lower: [15, 60, 60]
    hsv_upper: [40, 255, 255]
    min_area_ratio: 0.05

approach:
  name: yolo
  # Use latest-first fallback chain for best available Ultralytics architecture.
  model_candidates:
    - yolo26m.pt
    - yolo11m.pt
    - yolov8m.pt
  model: yolo26m.pt
  # Current best known checkpoint used for evaluation/inference until retrained.
  weights: apps/poc-model/swd_yolo_best.pt
  img_size: 1024
  conf: 0.25
  export_format: onnx

training:
  epochs: 120
  batch_size: 8
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  weight_decay: 0.0005
  warmup_epochs: 3.0
  patience: 50
  cos_lr: true
  close_mosaic: 10
  mosaic: 1.0
  mixup: 0.1
  copy_paste: 0.1
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  single_cls: true
  cache: false
  amp: true
  workers: 8

eval:
  compute_count_error: true
  max_images: 50
  # Written directly where backend model overview reads from.
  metrics_output_path: apps/poc-model/model_metrics.json
